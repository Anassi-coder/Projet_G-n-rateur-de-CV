<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css">
    <link rel="stylesheet" href="Cv.css">
    <title>Générateur de CV</title>
</head>

<body>
    <header class="d-flex justify-content-between align-items-center p-3" style="background-color: black;">
        <h1 class="m-0" style="color: whitesmoke; font-size: 1.5rem;">MON GÉNÉRATEUR DE CV</h1>
        <a href="index.html" class="btn btn-dark rounded-0" style=" color: black; background-color: whitesmoke;">ACCUEIL</a>
    </header>

    <div class="container-fluid p-4 my-4">
        <div class="row p-2 p-md-5">
            <section id="Infos-genrals" class="col-md-6 p-0 p-md-5 mb-5 mb-md-0">
                <div class="Infos-genrals-cnt">
                    <form action="export.php" method="POST" enctype="multipart/form-data" class="cv-form" id="cv-form">
                        <div class="cv-form-blk">
                            <div class="cv-form-row-title">
                                <h2>INFORMATIONS GÉNÉRALES</h2>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="nom" class="form-label">Nom</label>
                                        <input type="text" class="form-control" id="nom" name="nom"
                                            placeholder="Votre Nom" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="prenom" class="form-label">Prénom</label>
                                        <input type="text" class="form-control" id="prenom" name="prenom"
                                            placeholder="Votre Prénom" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="email" class="form-label">E-mail</label>
                                        <input type="email" class="form-control" id="email" name="email"
                                            placeholder="Votre email" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="telephone" class="form-label">Numéro de téléphone</label>
                                        <input type="tel" class="form-control" id="telephone" name="telephone"
                                            placeholder="Votre numéro de téléphone" required>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="photo" class="form-label">Votre photo</label>
                                <input type="file" class="form-control" id="photo" name="photo" accept="image/*"
                                    onchange="previewPhoto(event)">
                            </div>
                            <div class="mb-3">
                                <label for="titre" class="form-label">Titre professionnel</label>
                                <textarea class="form-control" id="titre" name="titre"
                                    placeholder="Votre titre professionnel" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Profil</label>
                                <textarea class="form-control" id="description" name="description"
                                    placeholder="Décrivez-vous" required></textarea>
                            </div>
                        </div>

                        <div class="cv-form-blk">
                            <div class="cv-form-row-title">
                                <h2>FORMATIONS</h2>
                            </div>
                            <div id="formations-container">
                                <div class="experience-item border-0">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Intitulé du diplôme ou de la formation</label>
                                                <input type="text" class="form-control" name="diplome[]"
                                                    placeholder="Intitulé du diplôme" required
                                                    oninput="updatePreview()">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Établissement</label>
                                                <input type="text" class="form-control" name="etablissement[]"
                                                    placeholder="Nom de l'établissement" required
                                                    oninput="updatePreview()">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Date de début</label>
                                                <input type="date" class="form-control" name="date_debut_formation[]"
                                                    id="" required onchange="updatePreview()">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Date de fin</label>
                                                <input type="date" class="form-control" name="date_fin_formation[]"
                                                    onchange="updatePreview()">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <textarea class="form-control" name="description_formation[]"
                                            placeholder="Décrivez votre formation" required
                                            oninput="updatePreview()"></textarea>
                                    </div>
                                    <button type="button" class="repeater-remove-btn"
                                        onclick="removeFormation(this)">Supprimer</button>
                                </div>
                            </div>
                            <button type="button" class="repeater-add-btn" onclick="addFormation()">Ajouter</button>
                        </div>

                        <div class="cv-form-blk">
                            <div class="cv-form-row-title">
                                <h2>EXPÉRIENCES PROFESSIONNELLES</h2>
                            </div>
                            <div id="experiences-container">
                                <div class="experience-item border-0">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Nom de l'entreprise</label>
                                                <input type="text" class="form-control" name="entreprise[]"
                                                    placeholder="Nom de l'entreprise" required
                                                    oninput="updatePreview()">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Intitulé du poste</label>
                                                <input type="text" class="form-control" name="poste[]"
                                                    placeholder="Intitulé du poste" required oninput="updatePreview()">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Date de début</label>
                                                <input type="date" class="form-control" name="date_debut[]" required
                                                    onchange="updatePreview()">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Date de fin</label>
                                                <input type="date" class="form-control" name="date_fin[]"
                                                    onchange="updatePreview()">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Description des missions</label>
                                        <textarea class="form-control" name="missions[]"
                                            placeholder="Décrivez vos missions" required
                                            oninput="updatePreview()"></textarea>
                                    </div>
                                    <button type="button" class="repeater-remove-btn"
                                        onclick="removeExperience(this)">Supprimer</button>
                                </div>
                            </div>
                            <button type="button" class="repeater-add-btn" onclick="addExperience()">Ajouter</button>
                        </div>

                        <div class="cv-form-blk">
                            <div class="cv-form-row-title">
                                <h2>COMPÉTENCES</h2>
                            </div>
                            <div id="competences-container">
                                <div class="experience-item border-0">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Nom de la compétence</label>
                                                <input type="text" class="form-control" name="competence[]"
                                                    placeholder="Nom de la compétence" required
                                                    oninput="updatePreview()">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Niveau</label>
                                                <input type="text" class="form-control" name="niveau[]"
                                                    placeholder="Niveau" required oninput="updatePreview()">
                                            </div>
                                        </div>
                                    </div>
                                    <button type="button" class="repeater-remove-btn"
                                        onclick="removeCompetence(this)">Supprimer</button>
                                </div>
                            </div>
                            <button type="button" class="repeater-add-btn" onclick="addCompetence()">Ajouter</button>
                        </div>

                        <div class="cv-form-blk">
                            <div class="cv-form-row-title">
                                <h2>INTÉRÊTS</h2>
                            </div>
                            <div id="interets-container">
                                <div class="experience-item border-0">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Type d'intérêt</label>
                                                <input type="text" class="form-control" name="type_interet[]"
                                                    placeholder="Ex: Sport, Voyage" required oninput="updatePreview()">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label class="form-label">Description</label>
                                                <input type="text" class="form-control" name="description_interet[]"
                                                    placeholder="Ex: Football, Italie" required
                                                    oninput="updatePreview()">
                                            </div>
                                        </div>
                                    </div>
                                    <button type="button" class="repeater-remove-btn"
                                        onclick="removeInteret(this)">Supprimer</button>
                                </div>
                            </div>
                            <button type="button" class="repeater-add-btn" onclick="addInteret()">Ajouter</button>
                        </div>

                        <div class="text-center my-4">
                            <button type="submit" form="cv-form" class="btn btn-primary rounded-0" id="btn">Télécharger
                                le CV</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="Infos-complets" class="col-md-6">
                <div class="cv-container row h-50 sticky-top">
                    <div class="col-md-4 left-column">
                        <div class="photo-frame">
                            <img src="" alt="Image de Profil" id="preview-photo" class="profile-image"
                                style="display: none;">
                        </div>
                        <div class="section-title">PROFIL</div>
                        <p id="preview-description"></p>
                        <div class="section-title">CONTACT</div>
                        <div class="contact-info">
                            E-mail :<span id="preview-email"></span>
                        </div>
                        <div class="contact-info">
                            Tél :</i> <span id="preview-telephone"></span>
                        </div>
                        <div class="section-title">INTÉRÊTS</div>
                        <div id="preview-interets"></div>
                    </div>
                    <div class="col-md-8 right-column">
                        <h1 class="text-center" id="preview-nom"></h1>
                        <h3 class="text-center" id="preview-titre"></h3>
                        <div class="section-title_">FORMATIONS</div>
                        <ul class="skills-list" id="preview-formations"></ul>
                        <div class="section-title_">EXPÉRIENCES PROFESSIONNELLES</div>
                        <div id="preview-experiences"></div>
                        <div class="section-title_">COMPÉTENCES</div>
                        <div id="preview-competences"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <footer class="text-center my-4" style="color: whitesmoke;">
        <h3>Mon Générateur de CV</h3>
        <div>
            <i class="fa-brands fa-github fa-2x"></i>
            <i class="fa-brands fa-linkedin fa-2x"></i>
            <i class="fa-brands fa-x-twitter fa-2x"></i>
            <i class="fa-brands fa-discord fa-2x"></i>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
